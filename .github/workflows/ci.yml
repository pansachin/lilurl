name: "ci"

on: [push]

jobs:
  deps:
    name: Setup Cache
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: install dependencies
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Download dependencies
        run: devbox run deps

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs:
      - deps
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: install dependencies
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Run tests
        run: devbox run test

  build-push:
    name: Build, Push
    runs-on: ubuntu-latest
    needs:
      - deps
      - test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: install dependencies
        uses: jetify-com/devbox-install-action@v0.12.0

      # - uses: actions/setup-go@v5
